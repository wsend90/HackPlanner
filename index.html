<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HackPlanner — Sistema profesional de planificación y gestión de activos en Ethical Hacking. Multi-proyecto, seguimiento, retest y más.">
    <title>HackPlanner — Gestión de Activos en Ethical Hacking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="scanline-overlay" aria-hidden="true"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <span class="logo-icon">⬡</span>
                <h1 class="logo-text">Hack<span class="accent">Planner</span></h1>
            </div>
            <p class="logo-subtitle">Multi-Project Manager</p>
        </div>

        <nav class="sidebar-nav" id="sidebarNav">
            <a href="#dashboard" class="nav-item active" data-view="dashboard" id="nav-dashboard">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="#projects" class="nav-item" data-view="projects" id="nav-projects">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                <span>Proyectos</span>
            </a>
            <a href="#calendar" class="nav-item" data-view="calendar" id="nav-calendar">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Calendario Global</span>
            </a>
            <a href="#plan" class="nav-item" data-view="plan" id="nav-plan">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span>Plan Diario</span>
            </a>
            <a href="#progress" class="nav-item" data-view="progress" id="nav-progress">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                <span>Progreso</span>
            </a>
            <a href="#registry" class="nav-item" data-view="registry" id="nav-registry">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                <span>Registro</span>
            </a>

            <div style="margin: var(--space-sm) var(--space-md); border-top: 1px solid var(--border-subtle);"></div>

            <a href="#admin" class="nav-item" data-view="admin" id="nav-admin">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
                <span>Administración</span>
            </a>
        </nav>

        <div class="sidebar-footer" style="padding: 1.5rem; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 0.5rem; margin-top: auto;">
            <button class="btn btn-secondary btn-sm" id="btnExportBackup" style="width: 100%; justify-content: center;">⬇ Exportar Datos</button>
            <label class="btn btn-secondary btn-sm" style="width: 100%; justify-content: center; cursor: pointer; text-align: center; margin: 0;">
                ⬆ Importar Datos
                <input type="file" id="fileImportBackup" accept=".json" style="display: none;">
            </label>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content" id="mainContent"></main>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle"></h2>
                <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Toasts -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="js/storage.js"></script>
    <script src="js/planner.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
